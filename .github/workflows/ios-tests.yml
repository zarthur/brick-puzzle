name: iOS tests

on:
  pull_request:
    branches:
      - main

concurrency:
  group: ios-tests-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    name: Build and test
    runs-on: macos-26
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Select an iPhone simulator
        id: simulator
        shell: bash
        run: |
          simulator_id="$(xcrun simctl list devices available -j | ruby -rjson -e '
            devices = JSON.parse(STDIN.read).fetch("devices").values.flatten
            iphone = devices.find { |device| device.fetch("name").start_with?("iPhone") }
            abort "No available iPhone simulator was found" unless iphone
            puts iphone.fetch("udid")
          ')"
          echo "id=$simulator_id" >> "$GITHUB_OUTPUT"
          xcrun simctl boot "$simulator_id" || true
          xcrun simctl bootstatus "$simulator_id" -b

      - name: Run unit and UI tests
        run: |
          xcodebuild test \
            -project BrickPuzzle.xcodeproj \
            -scheme BrickPuzzle \
            -destination "platform=iOS Simulator,id=${{ steps.simulator.outputs.id }}" \
            -derivedDataPath "$RUNNER_TEMP/BrickPuzzleDerivedData" \
            -resultBundlePath "$RUNNER_TEMP/BrickPuzzleTests.xcresult"

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: BrickPuzzle-test-results
          path: ${{ runner.temp }}/BrickPuzzleTests.xcresult
          if-no-files-found: ignore
          retention-days: 7
