name: iOS tests

on:
  pull_request:
    branches:
      - main

concurrency:
  group: ios-tests-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    name: Build and test
    runs-on: macos-26
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Select an iPhone simulator
        id: simulator
        run: python3 .github/scripts/ios_ci.py select-simulator

      # XCUITest execution is temporarily disabled on macos-26 because Xcode 26.5
      # cannot launch the runner (IDELaunchParametersSnapshot reports no debugger
      # version). Keep compiling the UI target so source regressions still fail CI.
      # Restore UI execution as part of https://github.com/zarthur/brick-puzzle/issues/51.
      - name: Build app and all test targets
        run: >-
          python3 .github/scripts/ios_ci.py build-for-testing
          --simulator-id "${{ steps.simulator.outputs.id }}"

      - name: Run unit tests
        run: >-
          python3 .github/scripts/ios_ci.py run-unit-tests
          --simulator-id "${{ steps.simulator.outputs.id }}"

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: BrickPuzzle-test-results
          path: ${{ runner.temp }}/BrickPuzzleTests.xcresult
          if-no-files-found: ignore
          retention-days: 7
